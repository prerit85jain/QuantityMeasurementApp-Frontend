<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quantity Measurement</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Variables ── */
:root{
  --teal:#2dd4bf;
  --teal-dark:#0d9488;
  --teal-light:#f0fdfa;
  --teal-border:#99f6e4;
  --blue:#3b5bdb;
  --gray:#64748b;
  --border:#e2e8f0;
  --dark:#1e293b;
  --white:#fff;
  --bg:#eff1f5;
  --red:#ef4444;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--dark);
}

/* ─────────────── HEADER ─────────────── */
header{
  background:var(--blue);
  color:#fff;height:56px;
  padding:0 36px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(59,91,219,.3);
}
.h-title{font-size:19px;font-weight:500;letter-spacing:.01em}
.h-right{display:flex;align-items:center;gap:14px}
.h-user{font-size:13px;opacity:.82}
.h-logout{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:6px 14px;border-radius:6px;
  font:500 13px 'DM Sans',sans-serif;cursor:pointer;
  transition:background .2s;
}
.h-logout:hover{background:rgba(255,255,255,.28)}

/* ─────────────── MAIN ─────────────── */
main{max-width:960px;margin:0 auto;padding:36px 20px}

/* section label */
.slabel{
  font-size:10.5px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gray);margin-bottom:14px;
}

/* ─────────────── TYPE CARDS ─────────────── */
.type-grid{display:flex;gap:14px;margin-bottom:32px;flex-wrap:wrap}
.type-card{
  flex:1;min-width:128px;max-width:185px;
  background:var(--white);
  border:2px solid var(--border);
  border-radius:14px;
  padding:22px 12px 18px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  cursor:pointer;
  transition:border-color .2s,box-shadow .2s,transform .15s;
  user-select:none;
}
.type-card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 6px 18px rgba(13,148,136,.13)}
.type-card.active{border-color:var(--teal-dark);background:var(--teal-light);box-shadow:0 4px 14px rgba(13,148,136,.18)}
.type-card svg{width:42px;height:56px}
.type-name{font-size:14.5px;font-weight:500;color:var(--gray)}
.type-card.active .type-name{color:var(--teal-dark);font-weight:600}

/* ─────────────── OP TABS ─────────────── */
.op-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.op-tab{
  padding:8px 18px;border-radius:100px;
  border:1.5px solid var(--border);
  background:var(--white);
  font:500 13px 'DM Sans',sans-serif;
  color:var(--gray);cursor:pointer;
  transition:all .2s;
}
.op-tab:hover{border-color:var(--teal);color:var(--teal-dark)}
.op-tab.active{background:var(--teal-dark);border-color:var(--teal-dark);color:#fff}

/* ─────────────── CONVERTER BOX ─────────────── */
.cbox{
  background:var(--white);border-radius:16px;
  padding:28px 26px;
  box-shadow:0 2px 14px rgba(0,0,0,.07);
}

/* unit row: FROM | swap | TO */
.unit-row{
  display:grid;
  grid-template-columns:1fr 56px 1fr;
  gap:16px;align-items:start;
  margin-bottom:22px;
}
.unit-col{display:flex;flex-direction:column;gap:10px}
.col-label{
  font-size:10.5px;font-weight:700;letter-spacing:.13em;
  text-transform:uppercase;color:var(--gray);
}

/* number input */
.val-inp{
  font-size:34px;font-weight:300;
  border:none;border-bottom:2px solid var(--border);
  padding:6px 0;width:100%;outline:none;
  color:var(--dark);background:transparent;
  font-family:'DM Sans',sans-serif;
  transition:border-color .2s;
  -moz-appearance:textfield;
}
.val-inp::-webkit-outer-spin-button,
.val-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.val-inp:focus{border-color:var(--teal-dark)}

/* unit dropdown */
.dd-wrap{position:relative}
.dd-btn{
  width:100%;height:42px;
  background:#f8fafc;border:1.5px solid var(--border);
  border-radius:8px;padding:0 12px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;
  font:14px 'DM Sans',sans-serif;color:var(--dark);
  transition:border-color .2s;user-select:none;
}
.dd-btn:hover{border-color:var(--teal)}
.dd-btn svg{transition:transform .2s;flex-shrink:0}
.dd-btn.open svg{transform:rotate(180deg)}

.dd-list{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--white);
  border:1.5px solid var(--border);border-radius:10px;
  box-shadow:0 8px 28px rgba(0,0,0,.13);
  z-index:50;display:none;
  max-height:224px;overflow-y:auto;
  animation:dd-in .16s ease;
}
.dd-list.open{display:block}
@keyframes dd-in{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.dd-opt{
  padding:10px 14px;font-size:13.5px;
  cursor:pointer;color:var(--dark);
  transition:background .12s;
}
.dd-opt:hover{background:var(--teal-light)}
.dd-opt.sel{background:#ccfbf1;color:var(--teal-dark);font-weight:500}
.dd-opt.dim{color:#cbd5e1;cursor:default;pointer-events:none}

/* swap button */
.swap-col{
  display:flex;align-items:flex-end;
  padding-bottom:8px;justify-content:center;
}
.swap-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--teal-light);
  border:1.5px solid var(--teal);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--teal-dark);
  transition:all .28s;
}
.swap-btn:hover{background:var(--teal);color:#fff;transform:rotate(180deg)}

/* ─── action row ─── */
.action-row{display:flex;gap:10px;align-items:center}
.go-btn{
  flex:1;height:50px;
  background:var(--teal-dark);color:#fff;
  border:none;border-radius:10px;
  font:500 15px 'DM Sans',sans-serif;
  cursor:pointer;
  transition:box-shadow .2s,transform .1s;
  letter-spacing:.02em;
}
.go-btn:hover{box-shadow:0 6px 20px rgba(13,148,136,.35)}
.go-btn:active{transform:scale(.98)}
.go-btn:disabled{background:#94a3b8;cursor:not-allowed;box-shadow:none}

.hist-btn{
  height:50px;padding:0 18px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:10px;
  font:500 13.5px 'DM Sans',sans-serif;color:var(--gray);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.hist-btn:hover{border-color:var(--teal);color:var(--teal-dark)}

/* ─── result box ─── */
.result{
  margin-top:20px;padding:18px 22px;border-radius:12px;
  background:var(--teal-light);border:1.5px solid var(--teal-border);
  display:none;
  animation:res-in .28s ease;
}
.result.show{display:block}
.result.is-err{background:#fef2f2;border-color:#fca5a5}
@keyframes res-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.res-label{
  font-size:10.5px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--teal-dark);margin-bottom:6px;
}
.result.is-err .res-label{color:var(--red)}
.res-value{font-size:30px;font-weight:300;color:var(--teal-dark)}
.result.is-err .res-value{font-size:14.5px;font-weight:400;color:var(--red)}
.res-meta{font-size:12.5px;color:var(--gray);margin-top:5px}

/* spinner inside button */
.spin{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;
  animation:sp .65s linear infinite;
  vertical-align:middle;margin-right:7px;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─────────────── HISTORY MODAL ─────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.42);backdrop-filter:blur(4px);
  z-index:200;display:none;
  align-items:center;justify-content:center;padding:20px;
}
.overlay.show{display:flex}

.modal{
  background:var(--white);border-radius:16px;
  width:100%;max-width:540px;max-height:78vh;
  display:flex;flex-direction:column;
  box-shadow:0 20px 55px rgba(0,0,0,.22);
  animation:modal-in .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modal-in{
  from{opacity:0;transform:scale(.93) translateY(18px)}
  to  {opacity:1;transform:scale(1)   translateY(0)}
}
.modal-head{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:16px;font-weight:600}
.modal-close{
  width:30px;height:30px;border-radius:50%;border:none;
  background:#f1f5f9;cursor:pointer;
  font-size:17px;color:var(--gray);
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{background:var(--border)}
.modal-body{padding:14px 22px;overflow-y:auto;flex:1}

.h-item{padding:13px 0;border-bottom:1px solid var(--border)}
.h-item:last-child{border-bottom:none}
.h-op{
  font-size:10.5px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--teal-dark);
}
.h-detail{font-size:13.5px;color:var(--dark);margin-top:3px}
.h-result{font-size:12.5px;color:var(--gray);margin-top:2px}
.h-empty{text-align:center;padding:36px 20px;color:var(--gray);font-size:14.5px}

/* ─────────────── TOAST ─────────────── */
#toast{
  position:fixed;top:66px;right:22px;
  padding:13px 18px;border-radius:10px;
  font-size:13.5px;font-weight:500;color:#fff;
  z-index:9999;pointer-events:none;
  transform:translateX(140%);
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  max-width:310px;box-shadow:0 8px 28px rgba(0,0,0,.2);
}
#toast.show{transform:translateX(0)}
#toast.ok  {background:#059669}
#toast.err {background:#dc2626}
#toast.info{background:var(--blue)}

/* ─── responsive ─── */
@media(max-width:580px){
  header{padding:0 14px}
  main{padding:18px 10px}
  .unit-row{grid-template-columns:1fr}
  .swap-col{display:none}
  .type-card{min-width:90px}
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <span class="h-title">Welcome To Quantity Measurement</span>
  <div class="h-right">
    <span class="h-user" id="h-user"></span>
    <button class="h-logout" onclick="logout()">Logout</button>
  </div>
</header>

<main>

  <!-- TYPE CHOOSER -->
  <p class="slabel">Choose Type</p>
  <div class="type-grid">

    <div class="type-card active" data-type="LengthUnit" onclick="pickType(this)">
      <svg viewBox="0 0 42 70" fill="none">
        <rect x="11" y="2" width="20" height="66" rx="4"
              fill="#e2e8f0" stroke="#2dd4bf" stroke-width="2.5"/>
        <line x1="11" y1="14" x2="19" y2="14" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="24" x2="23" y2="24" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="34" x2="19" y2="34" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="44" x2="23" y2="44" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
        <line x1="11" y1="54" x2="19" y2="54" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="type-name">Length</span>
    </div>

    <div class="type-card" data-type="TemperatureUnit" onclick="pickType(this)">
      <svg viewBox="0 0 42 70" fill="none">
        <rect x="15" y="4" width="12" height="46" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
        <circle cx="21" cy="58" r="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
        <rect x="18" y="32" width="6" height="18" rx="3" fill="#94a3b8"/>
        <circle cx="21" cy="58" r="6" fill="#94a3b8"/>
      </svg>
      <span class="type-name">Temperature</span>
    </div>

    <div class="type-card" data-type="VolumeUnit" onclick="pickType(this)">
      <svg viewBox="0 0 42 70" fill="none">
        <rect x="13" y="4" width="16" height="8" rx="2" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
        <path d="M13 12 L7 58 Q7 66 21 66 Q35 66 35 58 L29 12 Z"
              fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
        <path d="M9 42 Q21 38 33 42 L35 56 Q35 64 21 64 Q7 64 7 56 Z"
              fill="#94a3b8" opacity=".3"/>
      </svg>
      <span class="type-name">Volume</span>
    </div>

    <div class="type-card" data-type="WeightUnit" onclick="pickType(this)">
      <svg viewBox="0 0 42 70" fill="none">
        <ellipse cx="21" cy="58" rx="15" ry="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
        <rect x="18" y="30" width="6" height="28" fill="#94a3b8" opacity=".3"/>
        <circle cx="21" cy="22" r="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
        <text x="21" y="26" text-anchor="middle" font-size="10" fill="#94a3b8"
              font-family="sans-serif" font-weight="700">kg</text>
      </svg>
      <span class="type-name">Weight</span>
    </div>

  </div>

  <!-- OP TABS -->
  <div class="op-tabs">
    <button class="op-tab active" data-op="convert"  onclick="pickOp(this)">Convert</button>
    <button class="op-tab"        data-op="compare"  onclick="pickOp(this)">Compare</button>
    <button class="op-tab"        data-op="add"      onclick="pickOp(this)">Add</button>
    <button class="op-tab"        data-op="subtract" onclick="pickOp(this)">Subtract</button>
    <button class="op-tab"        data-op="divide"   onclick="pickOp(this)">Divide</button>
  </div>

  <!-- CONVERTER -->
  <div class="cbox">

    <div class="unit-row">

      <!-- FROM -->
      <div class="unit-col">
        <span class="col-label">From</span>
        <input class="val-inp" type="number" id="from-val" value="1" step="any" min="0"/>
        <div class="dd-wrap">
          <div class="dd-btn" id="from-btn" onclick="toggleDrop('from')">
            <span id="from-txt">—</span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <div class="dd-list" id="from-list"></div>
        </div>
      </div>

      <!-- SWAP -->
      <div class="swap-col">
        <button class="swap-btn" onclick="swapUnits()" title="Swap units">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>

      <!-- TO -->
      <div class="unit-col">
        <span class="col-label" id="to-lbl">To</span>
        <input class="val-inp" type="number" id="to-val" placeholder="—" step="any" min="0"/>
        <div class="dd-wrap">
          <div class="dd-btn" id="to-btn" onclick="toggleDrop('to')">
            <span id="to-txt">—</span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <div class="dd-list" id="to-list"></div>
        </div>
      </div>

    </div><!-- /unit-row -->

    <div class="action-row">
      <button class="go-btn" id="go-btn" onclick="doOperation()">Convert</button>
      <button class="hist-btn" onclick="openHistory()">History</button>
    </div>

    <!-- result -->
    <div class="result" id="result">
      <div class="res-label" id="res-label">Result</div>
      <div class="res-value" id="res-value"></div>
      <div class="res-meta"  id="res-meta"></div>
    </div>

  </div><!-- /cbox -->

</main>

<!-- HISTORY MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Operation History</span>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="h-empty">Loading…</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Config & auth guard ──────────────────────────────────────────────────────
const API = 'http://localhost:8080';

// Capture OAuth2 token from URL query param (?token=...) after Google/GitHub login
(function captureOAuth2Token() {
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('token');
  if (urlToken) {
    localStorage.setItem('qm_token', urlToken);
    // Clean the URL so the token isn't visible / reused on refresh
    history.replaceState({}, document.title, window.location.pathname);
  }
})();

const token = localStorage.getItem('qm_token');
if (!token) window.location.href = 'index.html';
document.getElementById('h-user').textContent = localStorage.getItem('qm_user') || '';

function logout() {
  localStorage.removeItem('qm_token');
  localStorage.removeItem('qm_user');
  window.location.href = 'index.html';
}

// ─── Unit data ────────────────────────────────────────────────────────────────
const UNITS = {
  LengthUnit:      ['FEET','INCHES','YARDS','CENTIMETERS'],
  TemperatureUnit: ['CELSIUS','FAHRENHEIT','KELVIN'],
  VolumeUnit:      ['LITRE','MILLILITRE','GALLON'],
  WeightUnit:      ['MILLIGRAM','GRAM','KILOGRAM','POUND','TONNE'],
};

const LABEL = {
  FEET:'Feet', INCHES:'Inches', YARDS:'Yards', CENTIMETERS:'Centimetres',
  CELSIUS:'Celsius', FAHRENHEIT:'Fahrenheit', KELVIN:'Kelvin',
  LITRE:'Litre', MILLILITRE:'Millilitre', GALLON:'Gallon',
  MILLIGRAM:'Milligram', GRAM:'Gram', KILOGRAM:'Kilogram', POUND:'Pound', TONNE:'Tonne',
};

// ─── State ────────────────────────────────────────────────────────────────────
let curType = 'LengthUnit';
let curOp   = 'convert';
let fromUnit = 'FEET';
let toUnit   = 'INCHES';

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3600);
}

// ─── API helper ───────────────────────────────────────────────────────────────
async function apiCall(path, body = null, method = 'POST') {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 401 || res.status === 403) { logout(); return null; }
  return res;
}

// ─── Type selection ───────────────────────────────────────────────────────────
function pickType(card) {
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  curType  = card.dataset.type;
  const u  = UNITS[curType];
  fromUnit = u[0];
  toUnit   = u.length > 1 ? u[1] : u[0];
  renderDrops();
  clearResult();
}

// ─── Op selection ─────────────────────────────────────────────────────────────
function pickOp(btn) {
  const op = btn.dataset.op;
  if (curType === 'TemperatureUnit' && ['add','subtract','divide'].includes(op)) {
    toast('Temperature does not support arithmetic operations', 'err'); return;
  }
  document.querySelectorAll('.op-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curOp = op;
  const labels = {convert:'Convert',compare:'Compare',add:'Add',subtract:'Subtract',divide:'Divide'};
  document.getElementById('go-btn').textContent = labels[op];
  document.getElementById('to-lbl').textContent = op === 'compare' ? 'With' : 'To';
  clearResult();
}

// ─── Dropdowns ────────────────────────────────────────────────────────────────
function renderDrops() {
  document.getElementById('from-txt').textContent = LABEL[fromUnit] || fromUnit;
  document.getElementById('to-txt').textContent   = LABEL[toUnit]   || toUnit;
  buildList('from');
  buildList('to');
}

function buildList(side) {
  const list = document.getElementById(side + '-list');
  list.innerHTML = '';
  UNITS[curType].forEach(u => {
    const cur   = side === 'from' ? fromUnit : toUnit;
    const other = side === 'from' ? toUnit   : fromUnit;
    const d = document.createElement('div');
    d.className = 'dd-opt' + (u === cur ? ' sel' : '') +
                  (u === other && curOp !== 'compare' ? ' dim' : '');
    d.textContent = LABEL[u] || u;
    d.onclick = () => {
      if (side === 'from') fromUnit = u;
      else                 toUnit   = u;
      closeDrop(side);
      renderDrops();
      clearResult();
    };
    list.appendChild(d);
  });
}

function toggleDrop(side) {
  const list = document.getElementById(side + '-list');
  const btn  = document.getElementById(side + '-btn');
  const wasOpen = list.classList.contains('open');
  // close all
  ['from','to'].forEach(s => {
    document.getElementById(s + '-list').classList.remove('open');
    document.getElementById(s + '-btn').classList.remove('open');
  });
  if (!wasOpen) {
    buildList(side);
    list.classList.add('open');
    btn.classList.add('open');
  }
}

function closeDrop(side) {
  document.getElementById(side + '-list').classList.remove('open');
  document.getElementById(side + '-btn').classList.remove('open');
}

// Close dropdowns when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.dd-wrap')) {
    ['from','to'].forEach(s => {
      document.getElementById(s + '-list').classList.remove('open');
      document.getElementById(s + '-btn').classList.remove('open');
    });
  }
});

function swapUnits() {
  [fromUnit, toUnit] = [toUnit, fromUnit];
  renderDrops();
  clearResult();
}

// ─── Result helpers ───────────────────────────────────────────────────────────
function clearResult() {
  document.getElementById('result').className = 'result';
}

function showResult(val, meta, isErr = false) {
  const box = document.getElementById('result');
  box.className = 'result show' + (isErr ? ' is-err' : '');
  document.getElementById('res-label').textContent = isErr ? 'Error' : 'Result';
  document.getElementById('res-value').textContent = val;
  document.getElementById('res-meta').textContent  = meta || '';
}

// ─── MAIN OPERATION ───────────────────────────────────────────────────────────
async function doOperation() {
  const fromVal = parseFloat(document.getElementById('from-val').value);
  const toVal   = parseFloat(document.getElementById('to-val').value);

  if (isNaN(fromVal)) {
    toast('Please enter a number in the FROM field', 'err'); return;
  }

  const needToVal = ['compare','add','subtract','divide'].includes(curOp);
  if (needToVal && isNaN(toVal)) {
    toast('Please enter a number in the TO / With field', 'err'); return;
  }

  if (curType === 'TemperatureUnit' && ['add','subtract','divide'].includes(curOp)) {
    toast('Temperature does not support arithmetic operations', 'err'); return;
  }

  const btn = document.getElementById('go-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Processing…';

  /*
   * Build the request body.
   *
   * For CONVERT:  thatQuantityDTO just needs the TARGET UNIT (value doesn't matter).
   * For all other ops: thatQuantityDTO carries the actual second value + unit.
   */
  const thisQ = { value: fromVal, unit: fromUnit, measurementType: curType };
  const thatQ = {
    value:           curOp === 'convert' ? fromVal : toVal,
    unit:            toUnit,
    measurementType: curType,
  };

  const endpoints = {
    convert:  '/api/v1/quantities/convert',
    compare:  '/api/v1/quantities/compare',
    add:      '/api/v1/quantities/add',
    subtract: '/api/v1/quantities/subtract',
    divide:   '/api/v1/quantities/divide',
  };

  try {
    const res = await apiCall(endpoints[curOp], { thisQuantityDTO: thisQ, thatQuantityDTO: thatQ });
    if (!res) return;

    // Parse response
    const ct = res.headers.get('Content-Type') || '';
    let d;
    if (ct.includes('application/json')) d = await res.json();
    else d = await res.text();

    console.log('API response [' + curOp + ']:', d);  // debug

    if (!res.ok) {
      const msg = (typeof d === 'string') ? d : (d.message || 'Server error');
      showResult(msg, '', true);
      return;
    }

    // DTO-level error flag
    if (d.error === true || d.errorMessage) {
      showResult(d.errorMessage || 'An error occurred', '', true);
      return;
    }

    // ── SUCCESS — interpret the QuantityMeasurementDTO ──
    let val = '', meta = '';

    if (curOp === 'convert') {
      // resultValue = converted number, resultUnit = target unit name
      const rv = (d.resultValue !== undefined && d.resultValue !== null) ? d.resultValue : '?';
      const ru = d.resultUnit ? (LABEL[d.resultUnit] || d.resultUnit) : (LABEL[toUnit] || toUnit);
      val  = rv + ' ' + ru;
      meta = fromVal + ' ' + (LABEL[fromUnit] || fromUnit) + ' → ' + (LABEL[toUnit] || toUnit);
      // Populate the TO field with the result
      document.getElementById('to-val').value = rv;

    } else if (curOp === 'compare') {
      // resultString is "true" or "false"
      const eq = (d.resultString === 'true');
      val  = eq ? '✓  Equal' : '✗  Not Equal';
      meta = fromVal + ' ' + (LABEL[fromUnit] || fromUnit) +
             '  vs  ' + toVal + ' ' + (LABEL[toUnit] || toUnit);

    } else {
      // add / subtract / divide — resultValue is the numeric answer
      const rv = (d.resultValue !== undefined && d.resultValue !== null) ? d.resultValue : '?';
      const ru = d.resultUnit ? (LABEL[d.resultUnit] || d.resultUnit) : '';
      val  = rv + (ru ? ' ' + ru : '');
      const sym = { add: '+', subtract: '−', divide: '÷' }[curOp] || curOp;
      meta = fromVal + ' ' + (LABEL[fromUnit] || fromUnit) +
             ' ' + sym + ' ' +
             toVal + ' ' + (LABEL[toUnit] || toUnit);
    }

    showResult(val, meta);

  } catch (e) {
    console.error(e);
    showResult(
      'Cannot reach the backend at ' + API +
      '. Make sure the Spring Boot server is running (mvn spring-boot:run).',
      '', true
    );
  } finally {
    const labels = { convert:'Convert', compare:'Compare', add:'Add', subtract:'Subtract', divide:'Divide' };
    btn.disabled = false;
    btn.textContent = labels[curOp];
  }
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
async function openHistory() {
  document.getElementById('overlay').classList.add('show');
  const body = document.getElementById('modal-body');
  body.innerHTML = '<div class="h-empty">Loading…</div>';

  try {
    const res = await apiCall('/api/v1/quantities/history/type/' + curType, null, 'GET');
    if (!res) { body.innerHTML = '<div class="h-empty">Session expired.</div>'; return; }

    const data = await res.json();
    console.log('History:', data);

    if (!Array.isArray(data) || data.length === 0) {
      body.innerHTML = '<div class="h-empty">No history found for ' +
                       curType.replace('Unit','') + '.</div>';
      return;
    }

    body.innerHTML = '';
    // Show newest first
    [...data].reverse().forEach(item => {
      const div = document.createElement('div');
      div.className = 'h-item';
      const fu = LABEL[item.thisUnit] || item.thisUnit || '';
      const tu = LABEL[item.thatUnit] || item.thatUnit || '';
      const ru = LABEL[item.resultUnit] || item.resultUnit || '';
      const resultText = item.error
        ? '⚠ Error: ' + (item.errorMessage || '')
        : 'Result: ' + (item.resultString || ((item.resultValue ?? '') + (ru ? ' ' + ru : '')));
      div.innerHTML =
        '<div class="h-op">' + (item.operation || 'operation') + '</div>' +
        '<div class="h-detail">' + (item.thisValue ?? '') + ' ' + fu +
          ' ↔ ' + (item.thatValue ?? '') + ' ' + tu + '</div>' +
        '<div class="h-result">' + resultText + '</div>';
      body.appendChild(div);
    });

  } catch (e) {
    body.innerHTML = '<div class="h-empty">Could not load history.</div>';
  }
}

function closeHistory() {
  document.getElementById('overlay').classList.remove('show');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeHistory();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderDrops();
</script>
